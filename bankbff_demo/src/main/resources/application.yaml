server:
  port: 8080
  servlet:
    session:
      cookie:
        name: BFF_SESSION
spring:
  application:
    name: bankbff_demo

  security:
    oauth2:
      client:
        registration:
          bank-auth:
            client-id: spa-client
            client-secret: spa-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - read:accounts
              - read:transactions
              - write:accounts
              - write:transactions

        provider:
          bank-auth:
            issuer-uri: http://localhost:9000

banking:
  resource-server:
    base-url: http://localhost:8081

logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG
    com.example.bankbff: DEBUG